  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CIRCUITS_LIST = [
      {
        id: 'kartcenter-campillos',
        name: '🏁 Kartcenter Campillos (Málaga)',
        shortName: 'CAMPILLOS',
        url: 'https://www.apex-timing.com/live-timing/kartcenter-campillos/',

    function parseTimeToMs(timeStr) {
      if (!timeStr || timeStr === '--.---' || timeStr === '') return 0;
      const clean = timeStr.replace(/[^0-9:.]/g, '').trim();
      const parts = clean.split(':');
      if (parts.length === 2) {
        return Math.round((parseFloat(parts[0]) * 60 + parseFloat(parts[1])) * 1000);
      }
      return Math.round(parseFloat(parts[0]) * 1000);
    }

    function formatLapTime(ms) {
      if (!ms || isNaN(ms) || ms === 0) return "--.---";
      const totalSeconds = ms / 1000;
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = (totalSeconds % 60).toFixed(3);
      if (minutes > 0) {
        const padSec = (totalSeconds % 60 < 10 ? '0' : '') + seconds;
        return `${minutes}:${padSec}`;
      }
      return seconds;
    }

    function formatDelta(deltaSeconds) {
      if (deltaSeconds === null || deltaSeconds === undefined || isNaN(deltaSeconds)) return " 0.000";
      const sign = deltaSeconds > 0 ? "+" : "";
      return `${sign}${deltaSeconds.toFixed(3)}`;
    }

    function getKartPerformanceTier(idx, total) {
      if (total <= 1) {
        return {
          emoji: '🚀',
          label: 'MISIL',
          colorClass: 'bg-purple-950/80 border-race-purple text-race-purple',
          borderClass: 'border-race-purple shadow-[0_0_25px_rgba(217,70,239,0.45)]',
          textGlowClass: 'text-race-purple text-glow-purple'
        };
      }
      if (total === 2) {
        if (idx === 0) {
          return {
            emoji: '🚀',
            label: 'MISIL',
            colorClass: 'bg-purple-950/80 border-race-purple text-race-purple',
            borderClass: 'border-race-purple shadow-[0_0_25px_rgba(217,70,239,0.45)]',
            textGlowClass: 'text-race-purple text-glow-purple'
          };
        }
        return {
          emoji: '🔴',
          label: 'PEOR',
          colorClass: 'bg-red-950/80 border-race-red text-race-red',
          borderClass: 'border-red-950/80 shadow-[0_0_15px_rgba(255,51,68,0.2)]',
          textGlowClass: 'text-race-red text-glow-red'
        };
      }
      if (total === 3) {
        if (idx === 0) {
          return {
            emoji: '🚀',
            label: 'MISIL',
            colorClass: 'bg-purple-950/80 border-race-purple text-race-purple',
            borderClass: 'border-race-purple shadow-[0_0_25px_rgba(217,70,239,0.45)]',
            textGlowClass: 'text-race-purple text-glow-purple'
          };
        }
        if (idx === 1) {
          return {
            emoji: '🟢',
            label: 'BUENO',
            colorClass: 'bg-emerald-950/80 border-emerald-500 text-emerald-400',
            borderClass: 'border-emerald-800 shadow-[0_0_15px_rgba(16,185,129,0.25)]',
            textGlowClass: 'text-emerald-400 text-glow-emerald'
          };
        }
        return {
          emoji: '🔴',
          label: 'PEOR',
          colorClass: 'bg-red-950/80 border-race-red text-race-red',
          borderClass: 'border-red-950/80 shadow-[0_0_15px_rgba(255,51,68,0.2)]',
          textGlowClass: 'text-race-red text-glow-red'
        };
      }

      const quarter = total / 4;
      if (idx < quarter) {
        return {
          emoji: '🚀',
          label: 'MISIL',
          colorClass: 'bg-purple-950/80 border-race-purple text-race-purple',
          borderClass: 'border-race-purple shadow-[0_0_25px_rgba(217,70,239,0.45)]',
          textGlowClass: 'text-race-purple text-glow-purple'
        };
      } else if (idx < quarter * 2) {
        return {
          emoji: '🟢',
          label: 'BUENO',
          colorClass: 'bg-emerald-950/80 border-emerald-500 text-emerald-400',
          borderClass: 'border-emerald-800 shadow-[0_0_15px_rgba(16,185,129,0.25)]',
          textGlowClass: 'text-emerald-400 text-glow-emerald'
        };
      } else if (idx < quarter * 3) {
        return {
          emoji: '🟠',
          label: 'MEDIO',
          colorClass: 'bg-amber-950/80 border-amber-500 text-amber-400',
          borderClass: 'border-amber-800 shadow-[0_0_15px_rgba(245,158,11,0.2)]',
          textGlowClass: 'text-amber-400 text-glow-amber'
        };
      } else {
        return {
          emoji: '🔴',
          label: 'PEOR',
          colorClass: 'bg-red-950/80 border-race-red text-race-red',
          borderClass: 'border-red-950/80 shadow-[0_0_15px_rgba(255,51,68,0.2)]',
          textGlowClass: 'text-race-red text-glow-red'
        };
      }
    }

    // HIGH PRECISION REAL APEX TIMING CLIENT
    class RealApexTimingClient {
      constructor(circuit, onUpdate, onSessionFinishedAlert) {
        this.circuit = circuit;
        this.onUpdate = onUpdate;
        this.onSessionFinishedAlert = onSessionFinishedAlert;
        
        this.wsSocket = null;
        this.pollInterval = null;
        
        this.configHost = 'live-data.apex-timing.com'; 
        
        // Dynamic & fallback column index mappings
        this.columnMap = {
          no: 'c4',
          dr: 'c5',
          llp: 'c9',
          blp: 'c10',
          tlp: 'c13'
        };
        
        // HTTP polling sequence indexes
        this.pollInit = 0;
        this.pollIndex = 0;
        
        const savedRecState = localStorage.getItem('apex_rec_active');
        this.isRecording = savedRecState === 'true'; 
        
        // Dual Registry Layers
        this.globalKarts = new Map(); 
        this.sessionRows = new Map(); 
        
        this.pollCounter = 0;
        this.randomSessionId = Math.floor(Math.random() * 1000000000) || 1;

        // Inactivity tracking
        this.lastLapTimestamp = Date.now();
        this.inactivityCheckInterval = null;

        // CONNECTION DIAGNOSTICS
        this.wsStatus = 'DESCONECTADO';
        this.httpStatus = 'DESCONECTADO';
        this.wsMessagesReceived = 0;
        this.httpMessagesReceived = 0;
        this.totalPayloadsProcessed = 0;
        this.lastError = '';
        this.activeProxyIndex = 0;
        this.corsProxies = [
          (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
          (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
          (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
        ];

        // Background Audio Keep-alive loop
        this.bgAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
        this.bgAudio.loop = true;
        this.wakeLock = null;

        this.handleBeforeUnload = this.handleBeforeUnload.bind(this);
        this.handleVisibilityChange = this.handleVisibilityChange.bind(this);

        this.loadCircuitStorage();
      }

      loadCircuitStorage() {
        try {
          const keyKarts = `apex_karts_db_${this.circuit.id}`;
          const savedKarts = localStorage.getItem(keyKarts);
          if (savedKarts) {
            const parsed = JSON.parse(savedKarts);
            Object.keys(parsed).forEach(kart => {
              this.globalKarts.set(kart, {
                kartNumber: parsed[kart].kartNumber || kart,
                drivers: new Set(parsed[kart].drivers || []),
                lapsMs: parsed[kart].lapsMs || [],
                bestLapMs: parsed[kart].bestLapMs || 0,
                lastRecordedLapStr: parsed[kart].lastRecordedLapStr || '',
                lastRecordedTotalLaps: parsed[kart].lastRecordedTotalLaps || 0
              });
            });
          }
        } catch(e) {}
      }

      start() {
        console.log('[Apex Client] Starting connection for:', this.circuit.name);
        
        window.addEventListener('beforeunload', this.handleBeforeUnload);
        window.addEventListener('pagehide', this.handleBeforeUnload);
        document.addEventListener('visibilitychange', this.handleVisibilityChange);

        const initialStatus = this.isRecording 
          ? '🔴 REGISTRANDO DATOS EN VIVO...' 
          : '⏸️ CAPTURA EN PAUSA (PULSA REC ON)';
          
        this.broadcastState(initialStatus);

        // INSTANT NON-BLOCKING WEBSOCKET CONNECT
        this.connectWebSocket();
        this.startHttpPollingFallback();

        // Non-blocking background host discovery
        this.discoverCorrectHost();

        if (this.isRecording) {
          this.acquireWakeLock();
          this.playBackgroundAudio();
        }
      }

      async discoverCorrectHost() {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 2500);

          const baseUrl = this.circuit.url.endsWith('/') ? this.circuit.url : this.circuit.url + '/';
          const configUrl = `${baseUrl}javascript/config.js`;
          const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(configUrl)}`;
          
          const response = await fetch(proxyUrl, { signal: controller.signal });
          clearTimeout(timeoutId);
          if (!response.ok) throw new Error();
          const jsText = await response.text();
          
          const hostMatch = jsText.match(/configHost\s*=\s*['"]([^'"]+)['"]/);
          if (hostMatch && hostMatch[1]) {
            const newHost = hostMatch[1].trim();
            if (newHost !== this.configHost) {
              this.configHost = newHost;
              console.log(`[Host Discovery] Updated host to: ${this.configHost}`);
              if (this.isRecording) this.connectWebSocket();
            }
          }
        } catch(e) {
          this.configHost = 'live-data.apex-timing.com';
        }
      }

      stop() {
        this.saveToLocalStorage();
        this.releaseWakeLock();
        this.stopBackgroundAudio();
        
        window.removeEventListener('beforeunload', this.handleBeforeUnload);
        window.removeEventListener('pagehide', this.handleBeforeUnload);
        document.removeEventListener('visibilitychange', this.handleVisibilityChange);

        if (this.wsSocket) this.wsSocket.close();
        if (this.pollInterval) clearInterval(this.pollInterval);
      }

      handleBeforeUnload() {
        this.saveToLocalStorage();
      }

      handleVisibilityChange() {
        this.saveToLocalStorage();
        if (document.visibilityState === 'visible' && this.isRecording) {
          this.acquireWakeLock();
          if (!this.wsSocket || this.wsSocket.readyState !== WebSocket.OPEN) {
            this.connectWebSocket();
          }
        }
      }

      async acquireWakeLock() {
        try {
          if ('wakeLock' in navigator && !this.wakeLock) {
            this.wakeLock = await navigator.wakeLock.request('screen');
          }
        } catch(err) {}
      }

      releaseWakeLock() {
        if (this.wakeLock) {
          this.wakeLock.release().then(() => {
            this.wakeLock = null;
          });
        }
      }

      playBackgroundAudio() {
        try {
          this.bgAudio.play().catch(() => {});
        } catch(e) {}
      }

      stopBackgroundAudio() {
        try {
          this.bgAudio.pause();
        } catch(e) {}
      }

      setRecordingMode(enabled) {
        this.isRecording = enabled;
        localStorage.setItem('apex_rec_active', enabled ? 'true' : 'false');
        
        if (enabled) {
          this.lastLapTimestamp = Date.now();
          this.acquireWakeLock();
          this.playBackgroundAudio();
          const statusMsg = '🔴 REGISTRANDO DATOS EN VIVO...';
          this.broadcastState(statusMsg);
          this.connectWebSocket();
        } else {
          this.releaseWakeLock();
          this.stopBackgroundAudio();
          const statusMsg = '⏸️ CAPTURA EN PAUSA';
          this.broadcastState(statusMsg);
        }
      }

      saveToLocalStorage() {
        try {
          const keyKarts = `apex_karts_db_${this.circuit.id}`;
          const obj = {};
          this.globalKarts.forEach((val, key) => {
            obj[key] = {
              kartNumber: val.kartNumber,
              drivers: Array.from(val.drivers),
              lapsMs: val.lapsMs,
              bestLapMs: val.bestLapMs,
              lastRecordedLapStr: val.lastRecordedLapStr,
              lastRecordedTotalLaps: val.lastRecordedTotalLaps
            };
          });
          localStorage.setItem(keyKarts, JSON.stringify(obj));
        } catch(e) {}
      }

      connectWebSocket() {
        try {
          if (this.wsSocket && (this.wsSocket.readyState === WebSocket.OPEN || this.wsSocket.readyState === WebSocket.CONNECTING)) {
            return;
          }

          const wsPort = this.circuit.configPort + 3;
          const wsUrl = `wss://${this.configHost}:${wsPort}/`;
          
          console.log(`[WS] Connecting to: ${wsUrl}`);
          this.wsStatus = 'CONECTANDO...';
          this.wsSocket = new WebSocket(wsUrl);
          
          this.wsSocket.onopen = () => {
            console.log('[WS] CONNECTED!');
            this.wsStatus = 'CONECTADO';
            this.broadcastState(this.getStatusLine());
          };

          this.wsSocket.onmessage = (event) => {
            this.wsMessagesReceived++;
            if (!this.isRecording) return;
            console.log(`[WS] MSG #${this.wsMessagesReceived} len=${event.data.length}`);
            this.processRawApexPayload(event.data);
          };

          this.wsSocket.onclose = (ev) => {
            console.log(`[WS] Closed: code=${ev.code} reason=${ev.reason}`);
            this.wsStatus = `CERRADO (${ev.code})`;
            this.broadcastState(this.getStatusLine());
            if (this.isRecording) {
              setTimeout(() => this.connectWebSocket(), 3000);
            }
          };

          this.wsSocket.onerror = (err) => {
            console.log('[WS] Error:', err);
            this.wsStatus = 'ERROR';
            this.lastError = 'WebSocket connection failed';
            this.broadcastState(this.getStatusLine());
          };
        } catch(e) {
          this.wsStatus = 'EXCEPCION';
          this.lastError = String(e);
        }
      }

      getStatusLine() {
        const karts = this.globalKarts.size;
        const totalLaps = Array.from(this.globalKarts.values()).reduce((sum, k) => sum + k.lapsMs.length, 0);
        if (this.isRecording) {
          return `🔴 REC | WS:${this.wsStatus} (${this.wsMessagesReceived}) | HTTP:(${this.httpMessagesReceived}) | Karts:${karts} Vueltas:${totalLaps}`;
        }
        return '⏸️ CAPTURA EN PAUSA';
      }

      startHttpPollingFallback() {
        this.pollInterval = setInterval(async () => {
          if (!this.isRecording) return;

          const apiPort = this.circuit.configPort + 4;
          const targetUrl = `https://${this.configHost}/live-timing/commonv2/functions/live_ajax.php?version=1.0.0&init=${this.pollInit}&index=${this.pollIndex}&port=${apiPort}&counter=${this.pollCounter}&duration=100&id=${this.randomSessionId}&ignored=0`;

          // Try each proxy until one works
          for (let pi = 0; pi < this.corsProxies.length; pi++) {
            const proxyIdx = (this.activeProxyIndex + pi) % this.corsProxies.length;
            const proxyUrl = this.corsProxies[proxyIdx](targetUrl);
            
            try {
              const controller = new AbortController();
              const timeoutId = setTimeout(() => controller.abort(), 4000);

              const response = await fetch(proxyUrl, { signal: controller.signal });
              clearTimeout(timeoutId);

              if (!response.ok) {
                console.log(`[HTTP] Proxy #${proxyIdx} returned ${response.status}`);
                continue;
              }
              const dataText = await response.text();

              this.pollCounter += 1;
              
              if (dataText && dataText !== 'error' && !dataText.includes('Service Unavailable') && !dataText.includes('<!DOCTYPE')) {
                const atIdx1 = dataText.indexOf('@');
                const atIdx2 = dataText.indexOf('@', atIdx1 + 1);
                if (atIdx1 > 0 && atIdx2 > atIdx1) {
                  this.pollInit = parseInt(dataText.substring(0, atIdx1), 10) || this.pollInit;
                  this.pollIndex = parseInt(dataText.substring(atIdx1 + 1, atIdx2), 10) || this.pollIndex;
                  
                  const payload = dataText.substring(atIdx2 + 1);
                  this.httpMessagesReceived++;
                  this.httpStatus = `OK (proxy #${proxyIdx})`;
                  this.activeProxyIndex = proxyIdx;
                  console.log(`[HTTP] Poll OK via proxy #${proxyIdx}, payload len=${payload.length}`);
                  this.processRawApexPayload(payload);
                }
                break; // Success, stop trying proxies
              }
            } catch(err) {
              console.log(`[HTTP] Proxy #${proxyIdx} failed: ${err.name}`);
              this.httpStatus = `FALLO proxy #${proxyIdx}`;
              // Try next proxy
            }
          }
        }, 3000);
      }

      // Continuously keeps HTTP polling active as fallback

      mergeRowToGlobal(rowId) {
        const row = this.sessionRows.get(rowId);
        if (!row || !row.kartNumber || row.kartNumber === '' || row.kartNumber === '0') return;

        const kartNum = row.kartNumber;
        if (!this.globalKarts.has(kartNum)) {
          this.globalKarts.set(kartNum, {
            kartNumber: kartNum,
            drivers: new Set(),
            lapsMs: [],
            bestLapMs: 0,
            lastRecordedLapStr: '',
            lastRecordedTotalLaps: 0
          });
        }

        const globalEntry = this.globalKarts.get(kartNum);

        // Track driver names
        row.drivers.forEach(d => {
          if (d) globalEntry.drivers.add(d);
        });

        // Track best lap
        if (row.bestLapMs > 0) {
          if (!globalEntry.bestLapMs || row.bestLapMs < globalEntry.bestLapMs) {
            globalEntry.bestLapMs = row.bestLapMs;
          }
        }

        // INITIAL SEEDING: If this kart has 0 laps recorded, seed with initial known valid laps
        if (globalEntry.lapsMs.length === 0) {
          if (row.bestLapMs > 0) {
            globalEntry.lapsMs.push(row.bestLapMs);
          }
          if (row.lastLapMs > 0 && row.lastLapMs !== row.bestLapMs) {
            globalEntry.lapsMs.push(row.lastLapMs);
          }
          if (row.lastLapStr) {
            globalEntry.lastRecordedLapStr = row.lastLapStr;
          }
          if (row.totalLaps > 0) {
            globalEntry.lastRecordedTotalLaps = row.totalLaps;
          }
          this.lastLapTimestamp = Date.now();
          return;
        }

        // LIVE LAP DEDUPLICATION:
        // A new lap is recorded ONLY IF lastLapStr changed OR totalLaps increased
        const isNewLapString = row.lastLapStr && row.lastLapStr !== globalEntry.lastRecordedLapStr;
        const isNewLapCount = row.totalLaps && row.totalLaps > globalEntry.lastRecordedTotalLaps;

        if (row.lastLapMs > 0 && (isNewLapString || isNewLapCount)) {
          globalEntry.lapsMs.push(row.lastLapMs);
          globalEntry.lastRecordedLapStr = row.lastLapStr;
          if (row.totalLaps > 0) {
            globalEntry.lastRecordedTotalLaps = row.totalLaps;
          }
          if (!globalEntry.bestLapMs || row.lastLapMs < globalEntry.bestLapMs) {
            globalEntry.bestLapMs = row.lastLapMs;
          }
          this.lastLapTimestamp = Date.now();
          console.log(`[Lap Acc] NEW LAP RECORDED: Kart #${kartNum} Lap #${globalEntry.lapsMs.length} = ${row.lastLapStr} (${row.lastLapMs}ms)`);
        }
      }

      processRawApexPayload(dataStr) {
        if (!this.isRecording || !dataStr || dataStr.trim() === '') return;
        this.totalPayloadsProcessed++;

        const lines = dataStr.split('\n');
        let hasUpdates = false;

        for (let li = 0; li < lines.length; li++) {
          const line = lines[li].trim();
          if (!line) continue;
          
          const pipeIdx = line.indexOf('|');
          if (pipeIdx < 0) continue;
          
          const cellId = line.substring(0, pipeIdx);
          const rest = line.substring(pipeIdx + 1);
          const pipeIdx2 = rest.indexOf('|');
          const valueType = pipeIdx2 >= 0 ? rest.substring(0, pipeIdx2) : rest;
          const value = pipeIdx2 >= 0 ? rest.substring(pipeIdx2 + 1) : '';

          // Init resets session rows (new session starting)
          if (cellId === 'init') {
            this.sessionRows.clear();
            console.log('[Parser] INIT received - session rows cleared');
            continue;
          }

          // Skip non-data lines
          if (cellId === 'css' || cellId === 'best' || cellId === 'effects' || 
              cellId === 'comments' || cellId === 'msg' || cellId === 'light' ||
              cellId === 'title1' || cellId === 'title2' || cellId === 'wth1' || 
              cellId === 'wth2' || cellId === 'wth3' || cellId === 'com') {
            continue;
          }

          // Track session status - CONTINUOUS RECORDING (triggers notice without pausing)
          if (cellId === 'dyn1' || cellId === 'track') {
            if (valueType === 'count') continue;
            const statusLower = value.toLowerCase();
            if (statusLower && (
              statusLower.includes('chequered') || 
              statusLower.includes('cuadros') || 
              statusLower.includes('bandera') ||
              statusLower.includes('finish') ||
              statusLower.includes('finaliz')
            )) {
              this.triggerSessionNotice(`BANDERA A CUADROS (${value})`);
            }
            continue;
          }

          // GRID HTML - full table with all current kart data
          if (cellId === 'grid') {
            try {
              const gridHtml = rest.substring(pipeIdx2 + 1); // everything after grid||
              const tempDiv = document.createElement('div');
              tempDiv.innerHTML = '<table>' + gridHtml + '</table>';
              
              // Parse header row for column mapping
              const headRow = tempDiv.querySelector('tr[data-id="r0"]') || tempDiv.querySelector('tr.head');
              if (headRow) {
                headRow.querySelectorAll('td[data-type]').forEach(cell => {
                  const colId = cell.getAttribute('data-id'); 
                  const colType = cell.getAttribute('data-type'); 
                  if (colId && colType) {
                    if (colType === 'no') this.columnMap.no = colId;
                    if (colType === 'dr') this.columnMap.dr = colId;
                    if (colType === 'llp') this.columnMap.llp = colId;
                    if (colType === 'blp') this.columnMap.blp = colId;
                    if (colType === 'tlp') this.columnMap.tlp = colId;
                  }
                });
                console.log('[Parser] Column map:', JSON.stringify(this.columnMap));
              }

              // Parse data rows
              const rows = tempDiv.querySelectorAll('tr[data-id]');
              let gridKartCount = 0;
              rows.forEach(row => {
                const rId = row.getAttribute('data-id');
                if (!rId || rId === 'r0') return;
                
                if (!this.sessionRows.has(rId)) {
                  this.sessionRows.set(rId, {
                    kartNumber: '',
                    drivers: new Set(),
                    lastLapMs: 0,
                    lastLapStr: '',
                    bestLapMs: 0,
                    totalLaps: 0
                  });
                }
                const entry = this.sessionRows.get(rId);
                
                // Find ALL elements with data-id inside this row (including nested divs/p)
                row.querySelectorAll('[data-id]').forEach(el => {
                  const dataId = el.getAttribute('data-id'); 
                  if (!dataId || !dataId.startsWith(rId)) return;
                  
                  const colSuffix = dataId.substring(rId.length); // e.g. 'c4', 'c5', 'c9', 'c10'
                  const val = el.textContent.trim();
                  if (!val) return;
                  
                  this.applyColumnValue(entry, colSuffix, val);
                });
                
                if (entry.kartNumber) {
                  gridKartCount++;
                  this.mergeRowToGlobal(rId);
                }
              });
              console.log(`[Parser] GRID parsed: ${gridKartCount} karts found`);
              hasUpdates = gridKartCount > 0;
            } catch(err) {
              console.error('[Parser] Grid parse error:', err);
            }
            continue;
          }

          // DELTA UPDATES - individual cell changes like r11c9|tn|1:48.923
          if (cellId.startsWith('r') && /^r\d+/.test(cellId)) {
            const match = cellId.match(/^(r\d+)(.+)$/);
            if (!match) continue;
            
            const rowId = match[1];
            const suffix = match[2]; // e.g. 'c4', 'c5', 'c9', 'c10', '*i1', '*i2', '*', '*in'

            // Skip internal timer/sort fields
            if (suffix.startsWith('*')) continue;

            if (!this.sessionRows.has(rowId)) {
              this.sessionRows.set(rowId, {
                kartNumber: '',
                drivers: new Set(),
                lastLapMs: 0,
                lastLapStr: '',
                bestLapMs: 0,
                totalLaps: 0
              });
            }

            const entry = this.sessionRows.get(rowId);
            
            if (this.applyColumnValue(entry, suffix, value)) {
              hasUpdates = true;
              this.mergeRowToGlobal(rowId);
            }
          }
        }

        if (hasUpdates) {
          this.saveToLocalStorage();
          this.broadcastState(this.getStatusLine());
        }
      }

      // Apply a column value to a session row entry. Returns true if meaningful data was applied.
      applyColumnValue(entry, colSuffix, value) {
        if (!value || !colSuffix) return false;
        
        // Kart number
        if (colSuffix === this.columnMap.no || colSuffix === 'c4') {
          const kartNum = value.replace(/[^\d]/g, '');
          if (kartNum) {
            entry.kartNumber = kartNum;
            return true;
          }
        }
        // Driver name
        else if (colSuffix === this.columnMap.dr || colSuffix === 'c5') {
          const driverName = value.replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ').trim();
          if (driverName && driverName.length > 1 && !driverName.includes('Piloto') && driverName !== 'Piloto') {
            entry.drivers.add(driverName);
            return true;
          }
        }
        // Total Laps count
        else if (colSuffix === this.columnMap.tlp || colSuffix === 'c13') {
          const totalLaps = parseInt(value.replace(/[^\d]/g, ''), 10);
          if (!isNaN(totalLaps) && totalLaps >= 0) {
            entry.totalLaps = totalLaps;
            return true;
          }
        }
        // Last lap time
        else if (colSuffix === this.columnMap.llp || colSuffix === 'c9') {
          const lastMs = parseTimeToMs(value);
          if (lastMs > 0) {
            entry.lastLapStr = value.trim();
            entry.lastLapMs = lastMs;
            return true;
          }
        }
        // Best lap time
        else if (colSuffix === this.columnMap.blp || colSuffix === 'c10') {
          const bestMs = parseTimeToMs(value);
          if (bestMs > 0) {
            entry.bestLapMs = bestMs;
            return true;
          }
        }
        return false;
      }

      triggerSessionNotice(reason) {
        if (!this.isRecording) return;
        this.saveToLocalStorage();
        console.log(`[Apex Client] Checkered flag notice: ${reason}`);
        if (this.onSessionFinishedAlert) {
          this.onSessionFinishedAlert(reason);
        }
      }

      triggerSessionEnd(reason) {
        this.triggerSessionNotice(reason);
      }

      calculateAverageClassification() {
        const results = [];
        this.globalKarts.forEach((entry, kartNum) => {
          const validLaps = entry.lapsMs.filter(l => l > 0);
          const totalMs = validLaps.reduce((a, b) => a + b, 0);
          const avgMs = validLaps.length > 0 ? Math.round(totalMs / validLaps.length) : (entry.bestLapMs || 0);

          if (avgMs > 0 || entry.bestLapMs > 0) {
            results.push({
              kartNumber: kartNum,
              drivers: Array.from(entry.drivers),
              avgLapMs: avgMs || entry.bestLapMs || 0,
              bestLapMs: entry.bestLapMs || 0,
              totalLaps: validLaps.length
            });
          }
        });

        return results.sort((a, b) => {
          if (a.avgLapMs === 0) return 1;
          if (b.avgLapMs === 0) return -1;
          return a.avgLapMs - b.avgLapMs;
        });
      }

      broadcastState(statusText) {
        const results = this.calculateAverageClassification();
        this.onUpdate({ 
          classifiedKarts: results, 
          isRecording: this.isRecording,
          statusText 
        });
      }

      resetCurrentCircuitData() {
        const keyKarts = `apex_karts_db_${this.circuit.id}`;
        
        // Pause recording so live stream packets don't immediately re-populate current track karts
        this.isRecording = false;
        localStorage.setItem('apex_rec_active', 'false');
        this.releaseWakeLock();
        this.stopBackgroundAudio();

        // Wipe all memory structures for this circuit
        this.sessionRows.clear();
        this.globalKarts.clear();
        
        // Remove circuit-specific storage and force empty state ONLY for this circuit
        try {
          localStorage.removeItem(keyKarts);
          localStorage.setItem(keyKarts, JSON.stringify({}));
        } catch(e) {}

        // Reset sequence & message counters
        this.pollInit = 0;
        this.pollIndex = 0;
        this.pollCounter = 0;
        this.wsMessagesReceived = 0;
        this.httpMessagesReceived = 0;
        this.totalPayloadsProcessed = 0;
        this.lastLapTimestamp = Date.now();

        console.log(`[Apex Client] COMPLETE DATA RESET ONLY FOR: ${this.circuit.name}`);
        this.broadcastState(`🗑️ DATOS BORRADOS COMPLETAMENTE. CAPTURA EN PAUSA (PULSA REC ON).`);
      }
    }

      return (
        <div className="fixed inset-0 z-50 bg-black/85 backdrop-blur-md flex items-center justify-center p-4 font-mono select-none">
          <div className="bg-zinc-950 border-2 border-race-purple rounded-2xl w-full max-w-sm p-4 text-center space-y-4 shadow-[0_0_30px_rgba(217,70,239,0.5)]">
            <div className="text-3xl">🏁</div>
            <h3 className="text-sm font-black text-race-purple uppercase tracking-wider text-glow-purple">
              ¡BANDERA A CUADROS DETECTADA!
            </h3>
            <p className="text-[11px] text-zinc-300 leading-relaxed">
              Ha finalizado una tanda en la pista. <strong className="text-race-purple">El programa SIGUE GRABANDO en vivo</strong> sin detenerse ni pausarse.
            </p>
            <div className="bg-black p-2.5 border border-zinc-900 rounded-xl text-[10px] text-zinc-400">
              💡 Tus promedios y karts se mantendrán acumulados continuamente para la siguiente manga.
            </div>
            <button
              onClick={onClose}
              className="w-full bg-race-purple text-black font-black py-2.5 rounded-xl text-xs transition-all active:scale-95 shadow-[0_0_12px_rgba(217,70,239,0.4)]"
            >
              ENTENDIDO (SEGUIR GRABANDO)
            </button>
          </div>
        </div>
      );
    }

    // Main App Root
    function App() {
      const [selectedCircuit, setSelectedCircuit] = useState(CIRCUITS_LIST[0]);
      const [classifiedKarts, setClassifiedKarts] = useState([]);
      const [isRecording, setIsRecording] = useState(false);
      const [statusText, setStatusText] = useState('⏸️ CAPTURA EN PAUSA (PULSA REC ON)');
      const [isLiveTimingOpen, setIsLiveTimingOpen] = useState(false);
      const [isConfigOpen, setIsConfigOpen] = useState(false);
      const [isSessionAlertOpen, setIsSessionAlertOpen] = useState(false);

      const engineRef = useRef(null);

      useEffect(() => {
        engineRef.current = new RealApexTimingClient(
          selectedCircuit,
          (data) => {
            setClassifiedKarts(data.classifiedKarts);
            if (data.isRecording !== undefined) setIsRecording(data.isRecording);
            setStatusText(data.statusText);
          },
          () => {
            setIsSessionAlertOpen(true);
          }
        );

        engineRef.current.start();

        return () => {
          if (engineRef.current) engineRef.current.stop();
        };
      }, [selectedCircuit]);

      const handleToggleRecording = () => {
        const nextState = !isRecording;
        setIsRecording(nextState);
        if (engineRef.current) {
          engineRef.current.setRecordingMode(nextState);
        }
      };

      const handleResetCircuit = () => {
        if (window.confirm(`¿Estás seguro de BORRAR TODOS los datos acumulados ÚNICAMENTE del circuito "${selectedCircuit.shortName}"?\n\n(Los demás circuitos conservarán sus datos intactos).`)) {
          if (engineRef.current) {
            engineRef.current.resetCurrentCircuitData();
          }
        }
      };

      return (
        <div className="h-full w-full bg-black text-white flex flex-col overflow-hidden relative font-mono text-xs">
          <Header
            selectedCircuit={selectedCircuit}
            onSelectCircuit={setSelectedCircuit}
            totalKarts={classifiedKarts.length}
            statusText={statusText}
            isRecording={isRecording}
            onToggleRecording={handleToggleRecording}
            onResetCircuit={handleResetCircuit}
            onOpenLiveTiming={() => setIsLiveTimingOpen(true)}
            onOpenConfig={() => setIsConfigOpen(true)}
          />

          <main className="flex-1 flex flex-col min-h-0 bg-black overflow-hidden relative">
            <KartClassifier
              classifiedKarts={classifiedKarts}
              selectedCircuit={selectedCircuit}
              isRecording={isRecording}
              statusText={statusText}
            />
          </main>

          <LiveTimingModal
            isOpen={isLiveTimingOpen}
            onClose={() => setIsLiveTimingOpen(false)}
            selectedCircuit={selectedCircuit}
          />

          <SettingsModal
            isOpen={isConfigOpen}
            onClose={() => setIsConfigOpen(false)}
            selectedCircuit={selectedCircuit}
          />

          <SessionAlertModal
            isOpen={isSessionAlertOpen}
            onClose={() => setIsSessionAlertOpen(false)}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
