<body class="h-full w-full bg-black text-white antialiased overflow-hidden">
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CIRCUITS_LIST = [
      {
        id: 'kartcenter-campillos',
        name: '🏁 Kartcenter Campillos (Málaga)',
        url: 'https://www.apex-timing.com/live-timing/kartcenter-campillos/',
        trackLength: '1.580m',
        configPort: 9370
      },
      {
        id: 'ariza-racing',
        name: '🏁 Karting Ariza Racing Circuit',
        url: 'https://www.apex-timing.com/live-timing/ariza-racing-circuit/',
        trackLength: '1.240m',
        configPort: 8970
      }
    ];

    function parseTimeToMs(timeStr) {
      if (!timeStr || timeStr === '--.---' || timeStr === '') return 0;
      const clean = timeStr.replace(/[^0-9:.]/g, '').trim();
      const parts = clean.split(':');
      if (parts.length === 2) {
        return Math.round((parseFloat(parts[0]) * 60 + parseFloat(parts[1])) * 1000);
      }
      return Math.round(parseFloat(parts[0]) * 1000);
    }

    function formatLapTime(ms) {
      if (!ms || isNaN(ms) || ms === 0) return "--.---";
      const totalSeconds = ms / 1000;
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = (totalSeconds % 60).toFixed(3);
      if (minutes > 0) {
        const padSec = (totalSeconds % 60 < 10 ? '0' : '') + seconds;
        return `${minutes}:${padSec}`;
      }
      return seconds;
    }

    function formatDelta(deltaSeconds) {
      if (deltaSeconds === null || deltaSeconds === undefined || isNaN(deltaSeconds)) return " 0.000";
      const sign = deltaSeconds > 0 ? "+" : "";
      return `${sign}${deltaSeconds.toFixed(3)}`;
    }

    // HIGH PRECISION REAL APEX TIMING CLIENT (DIRECT WEBSOCKET + DYNAMIC HTTP FALLBACK)
    class RealApexTimingClient {
      constructor(circuit, onUpdate, onSessionFinishedAlert) {
        this.circuit = circuit;
        this.onUpdate = onUpdate;
        this.onSessionFinishedAlert = onSessionFinishedAlert;
        
        this.wsSocket = null;
        this.pollInterval = null;
        
        // PERSISTED RECORDING STATE (Load from localStorage)
        const savedRecState = localStorage.getItem('apex_rec_active');
        this.isRecording = savedRecState === 'true'; 
        
        // Active Kart Registry
        this.kartRegistry = new Map();
        
        // Polling counter
        this.pollCounter = 0;
        this.randomSessionId = Math.floor(Math.random() * 1000000000) || 1;

        // Inactivity tracking (to detect session end)
        this.lastLapTimestamp = Date.now();
        this.inactivityCheckInterval = null;

        // Background Audio Loop
        this.bgAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
        this.bgAudio.loop = true;
        this.wakeLock = null;

        // Auto-bound handlers
        this.handleBeforeUnload = this.handleBeforeUnload.bind(this);
        this.handleVisibilityChange = this.handleVisibilityChange.bind(this);

        this.loadCircuitStorage();
      }

      loadCircuitStorage() {
        try {
          const keyKarts = `apex_karts_db_${this.circuit.id}`;
          const savedKarts = localStorage.getItem(keyKarts);
          if (savedKarts) {
            const parsed = JSON.parse(savedKarts);
            Object.keys(parsed).forEach(kart => {
              this.kartRegistry.set(kart, {
                kartNumber: parsed[kart].kartNumber || kart,
                drivers: new Set(parsed[kart].drivers || []),
                lapsMs: parsed[kart].lapsMs || [],
                bestLapMs: parsed[kart].bestLapMs || 0
              });
            });
          }
        } catch(e) {}
      }

      start() {
        console.log('[Apex Client] Listening for:', this.circuit.name);
        
        window.addEventListener('beforeunload', this.handleBeforeUnload);
        window.addEventListener('pagehide', this.handleBeforeUnload);
        document.addEventListener('visibilitychange', this.handleVisibilityChange);

        const initialStatus = this.isRecording 
          ? '🔴 TELEMETRÍA REAL ACTIVA (EN ESPERA)' 
          : '⏸️ CAPTURA EN PAUSA (PULSA REC ON)';
          
        this.broadcastState(initialStatus);

        this.connectWebSocket();
        this.startHttpPollingFallback();
        this.startInactivityChecker();

        if (this.isRecording) {
          this.acquireWakeLock();
          this.playBackgroundAudio();
        }
      }

      stop() {
        this.saveToLocalStorage();
        this.releaseWakeLock();
        this.stopBackgroundAudio();
        
        window.removeEventListener('beforeunload', this.handleBeforeUnload);
        window.removeEventListener('pagehide', this.handleBeforeUnload);
        document.removeEventListener('visibilitychange', this.handleVisibilityChange);

        if (this.wsSocket) this.wsSocket.close();
        if (this.pollInterval) clearInterval(this.pollInterval);
        if (this.inactivityCheckInterval) clearInterval(this.inactivityCheckInterval);
      }

      handleBeforeUnload() {
        this.saveToLocalStorage();
      }

      handleVisibilityChange() {
        this.saveToLocalStorage();
        if (document.visibilityState === 'visible' && this.isRecording) {
          this.acquireWakeLock();
          if (!this.wsSocket || this.wsSocket.readyState !== WebSocket.OPEN) {
            this.connectWebSocket();
          }
        }
      }

      async acquireWakeLock() {
        try {
          if ('wakeLock' in navigator && !this.wakeLock) {
            this.wakeLock = await navigator.wakeLock.request('screen');
          }
        } catch(err) {}
      }

      releaseWakeLock() {
        if (this.wakeLock) {
          this.wakeLock.release().then(() => {
            this.wakeLock = null;
          });
        }
      }

      playBackgroundAudio() {
        try {
          this.bgAudio.play().catch(() => {});
        } catch(e) {}
      }

      stopBackgroundAudio() {
        try {
          this.bgAudio.pause();
        } catch(e) {}
      }

      setRecordingMode(enabled) {
        this.isRecording = enabled;
        localStorage.setItem('apex_rec_active', enabled ? 'true' : 'false');
        
        if (enabled) {
          this.lastLapTimestamp = Date.now();
          this.acquireWakeLock();
          this.playBackgroundAudio();
          const statusMsg = '🔴 REGISTRANDO DATOS EN VIVO...';
          this.broadcastState(statusMsg);
          this.connectWebSocket();
        } else {
          this.releaseWakeLock();
          this.stopBackgroundAudio();
          const statusMsg = '⏸️ CAPTURA EN PAUSA';
          this.broadcastState(statusMsg);
        }
      }

      saveToLocalStorage() {
        try {
          const keyKarts = `apex_karts_db_${this.circuit.id}`;
          const obj = {};
          this.kartRegistry.forEach((val, key) => {
            obj[key] = {
              kartNumber: val.kartNumber,
              drivers: Array.from(val.drivers),
              lapsMs: val.lapsMs,
              bestLapMs: val.bestLapMs
            };
          });
          localStorage.setItem(keyKarts, JSON.stringify(obj));
        } catch(e) {}
      }

      connectWebSocket() {
        try {
          if (this.wsSocket) this.wsSocket.close();

          const wsPort = this.circuit.configPort + 3;
          const wsUrl = `wss://www.apex-timing.com:${wsPort}/`;
          
          this.wsSocket = new WebSocket(wsUrl);
          
          this.wsSocket.onopen = () => {
            if (this.isRecording) {
              this.broadcastState('🔴 TELEMETRÍA REAL EN VIVO (WS)');
            }
          };

          this.wsSocket.onmessage = (event) => {
            if (!this.isRecording) return;
            this.processRawApexPayload(event.data);
          };

          this.wsSocket.onclose = () => {
            if (this.isRecording) {
              setTimeout(() => this.connectWebSocket(), 5000);
            }
          };
        } catch(e) {}
      }

      startHttpPollingFallback() {
        this.pollInterval = setInterval(async () => {
          if (!this.isRecording) return;

          try {
            const apiPort = this.circuit.configPort + 4;
            const targetUrl = `https://www.apex-timing.com/live-timing/commonv2/functions/live_ajax.php?version=1.0.0&init=0&index=0&port=${apiPort}&counter=${this.pollCounter}&duration=100&id=${this.randomSessionId}&ignored=0`;
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('CORS Proxy failed');
            const dataText = await response.text();

            this.pollCounter += 1;
            
            if (dataText && dataText !== 'error' && !dataText.includes('Service Unavailable')) {
              const parts = dataText.split('@');
              const payload = parts.length >= 3 ? parts[2] : dataText;
              this.processRawApexPayload(payload);
            }
          } catch(err) {}
        }, 3000);
      }

      // Check inactivity to auto-finish session if track goes silent for more than 90 seconds
      startInactivityChecker() {
        this.inactivityCheckInterval = setInterval(() => {
          if (!this.isRecording) return;
          
          // Only check if we have registered laps
          let totalLapsRegistered = 0;
          this.kartRegistry.forEach(k => totalLapsRegistered += k.lapsMs.length);

          if (totalLapsRegistered > 2) {
            const idleTimeSeconds = (Date.now() - this.lastLapTimestamp) / 1000;
            if (idleTimeSeconds > 90) {
              console.log('[Inactivity] No lap registered in 90s. Auto finishing session.');
              this.triggerSessionEnd('INACTIVIDAD (90s sin vueltas)');
            }
          }
        }, 10000);
      }

      processRawApexPayload(dataStr) {
        if (!this.isRecording || !dataStr || dataStr.trim() === '') return;

        const lines = dataStr.split('\n');
        let hasUpdates = false;

        lines.forEach(line => {
          const parts = line.split('|');
          if (parts.length >= 3) {
            const cellId = parts[0];
            const value = parts[2];

            // 🏁 Direct Checkered Flag / Session Finish detection from status cells
            if (cellId === 'dyn1' || cellId === 'track') {
              const statusText = value.trim();
              if (statusText) {
                const lower = statusText.toLowerCase();
                if (
                  lower.includes('chequered') || 
                  lower.includes('cuadros') || 
                  lower.includes('finish') || 
                  lower.includes('finaliz') || 
                  lower.includes('termina') || 
                  lower.includes('comple') || 
                  lower.includes('end')
                ) {
                  this.triggerSessionEnd(`BANDERA A CUADROS (${statusText})`);
                  return;
                }
              }
            }

            // Driver row cell updates
            if (cellId.startsWith('r')) {
              const match = cellId.match(/^(r\d+)(.*)$/);
              if (match) {
                const rowId = match[1];
                const suffix = match[2];

                if (!this.kartRegistry.has(rowId)) {
                  this.kartRegistry.set(rowId, {
                    kartNumber: '',
                    drivers: new Set(),
                    lapsMs: [],
                    bestLapMs: 0
                  });
                }

                const entry = this.kartRegistry.get(rowId);
                hasUpdates = true;

                if (suffix === 'dr') {
                  const driverName = value.replace(/&nbsp;/g, ' ').trim();
                  if (driverName && !driverName.includes('Piloto') && driverName !== '') {
                    entry.drivers.add(driverName);
                  }
                } else if (suffix === 'no') {
                  entry.kartNumber = value.trim();
                } else if (suffix === 'blp') {
                  const bestMs = parseTimeToMs(value);
                  if (bestMs > 0) {
                    entry.bestLapMs = bestMs;
                  }
                } else if (suffix === 'llp') {
                  const lastMs = parseTimeToMs(value);
                  if (lastMs > 0) {
                    entry.lapsMs.push(lastMs);
                    this.lastLapTimestamp = Date.now(); // Reset inactivity timer
                    if (!entry.bestLapMs || lastMs < entry.bestLapMs) {
                      entry.bestLapMs = lastMs;
                    }
                  }
                }
              }
            }
          }
        });

        if (hasUpdates) {
          this.saveToLocalStorage();
          this.broadcastState('🔴 TELEMETRÍA REAL EN VIVO (APEX)');
        }
      }

      triggerSessionEnd(reason) {
        if (!this.isRecording) return;
        
        console.log(`[Apex Client] Session finish triggered. Reason: ${reason}`);
        
        // Save state immediately
        this.saveToLocalStorage();
        
        // Auto-pause recording to preserve this session's data
        this.isRecording = false;
        localStorage.setItem('apex_rec_active', 'false');
        this.releaseWakeLock();
        this.stopBackgroundAudio();
        
        // Trigger UI callback
        this.broadcastState('🏁 SESIÓN FINALIZADA (CAP. PAUSADA)');
        if (this.onSessionFinishedAlert) {
          this.onSessionFinishedAlert();
        }
      }

      calculateAverageClassification() {
        const kartsMap = new Map();

        this.kartRegistry.forEach((rowEntry) => {
          const kartNum = rowEntry.kartNumber;
          if (!kartNum || kartNum === '' || kartNum === '0') return;

          if (!kartsMap.has(kartNum)) {
            kartsMap.set(kartNum, {
              kartNumber: kartNum,
              drivers: new Set(),
              lapsMs: [],
              bestLapMs: 0
            });
          }

          const kartEntry = kartsMap.get(kartNum);

          rowEntry.drivers.forEach(d => {
            if (d) kartEntry.drivers.add(d);
          });

          rowEntry.lapsMs.forEach(lap => {
            if (lap > 0) kartEntry.lapsMs.push(lap);
          });

          if (rowEntry.bestLapMs > 0) {
            if (!kartEntry.bestLapMs || rowEntry.bestLapMs < kartEntry.bestLapMs) {
              kartEntry.bestLapMs = rowEntry.bestLapMs;
            }
          }
        });

        const results = [];
        kartsMap.forEach((entry, kartNum) => {
          const validLaps = entry.lapsMs.filter(l => l > 0);
          const totalMs = validLaps.reduce((a, b) => a + b, 0);
          const avgMs = validLaps.length > 0 ? Math.round(totalMs / validLaps.length) : entry.bestLapMs;

          results.push({
            kartNumber: kartNum,
            drivers: Array.from(entry.drivers),
            avgLapMs: avgMs || entry.bestLapMs || 0,
            bestLapMs: entry.bestLapMs || 0,
            totalLaps: validLaps.length
          });
        });

        return results.sort((a, b) => a.avgLapMs - b.avgLapMs);
      }

      broadcastState(statusText) {
        const results = this.calculateAverageClassification();
        this.onUpdate({ 
          classifiedKarts: results, 
          isRecording: this.isRecording,
          statusText 
        });
      }

      resetCurrentCircuitData() {
        const keyKarts = `apex_karts_db_${this.circuit.id}`;
        this.kartRegistry.clear();
        localStorage.removeItem(keyKarts);
        this.broadcastState(`REINICIADOS DATOS DE: ${this.circuit.name}`);
      }
    }

    // Header Component
    function Header({ selectedCircuit, onSelectCircuit, totalKarts, statusText, isRecording, onToggleRecording, onResetCircuit, onOpenLiveTiming, onOpenConfig }) {
      return (
        <header className="w-full bg-black border-b border-zinc-800 flex flex-col shrink-0 select-none font-mono text-xs">
          {/* Top Control Bar */}
          <div className="flex flex-wrap items-center justify-between gap-1.5 px-2.5 py-2 border-b border-zinc-900 text-xs">
            <button
              onClick={onToggleRecording}
              className={`flex items-center gap-1 px-2.5 py-1.5 rounded-xl text-[11px] font-black transition-all shadow-md active:scale-95 ${
                isRecording 
                  ? 'bg-race-purple text-black shadow-[0_0_12px_rgba(217,70,239,0.6)] animate-pulse' 
                  : 'bg-zinc-800 text-zinc-400 hover:text-white border border-zinc-700'
              }`}
            >
              <span>{isRecording ? '🔴 REC: ON' : '⏸️ REC: OFF'}</span>
            </button>

            <button
              onClick={onOpenLiveTiming}
              className="bg-race-purple text-black font-mono font-black text-[11px] sm:text-xs px-3 py-1.5 rounded-xl hover:bg-emerald-400 transition-all active:scale-95 shadow-[0_0_12px_rgba(217,70,239,0.6)] flex items-center gap-1"
            >
              <span>⏱️ TIMING EN DIRECTO</span>
            </button>

            <div className="flex items-center gap-1">
              <button
                onClick={onResetCircuit}
                className="bg-red-950/80 border border-race-red text-race-red font-mono text-[10px] sm:text-[11px] font-extrabold px-2 py-1 rounded-xl hover:bg-red-900 hover:text-white active:scale-95 transition-all"
              >
                🗑️ REINICIAR
              </button>

              <button
                onClick={onOpenConfig}
                className="bg-zinc-900 border border-zinc-800 text-zinc-300 text-[11px] font-bold px-2 py-1 rounded-xl hover:text-white active:scale-95"
              >
                ⚙️
              </button>
            </div>
          </div>

          {/* Circuit Selector */}
          <div className="px-2.5 py-1.5 bg-zinc-950 border-b border-zinc-900 flex flex-col gap-1">
            <div className="flex items-center justify-between text-[10px] font-bold text-zinc-400">
              <span>CIRCUITO ACTIVO:</span>
              <span className="text-race-purple font-bold">LONGITUD: {selectedCircuit.trackLength}</span>
            </div>
            
            <select
              value={selectedCircuit.id}
              onChange={(e) => {
                const found = CIRCUITS_LIST.find(c => c.id === e.target.value);
                if (found) onSelectCircuit(found);
              }}
              className="w-full bg-black border-2 border-race-purple text-race-purple font-black text-xs rounded-xl px-2.5 py-2 focus:outline-none shadow-[0_0_10px_rgba(217,70,239,0.3)] cursor-pointer"
            >
              {CIRCUITS_LIST.map(circuit => (
                <option key={circuit.id} value={circuit.id} className="bg-black text-white">
                  {circuit.name}
                </option>
              ))}
            </select>
          </div>

          {/* Title Bar */}
          <div className="px-2.5 py-1.5 bg-black flex items-center justify-between">
            <h1 className="text-sm sm:text-base font-black text-white flex items-center gap-1">
              <span>🏆</span>
              <span className="text-race-purple text-glow-purple">CLASIFICACIÓN POR MEDIA DE KART</span>
            </h1>
            <span className="text-[10px] sm:text-[11px] font-bold text-zinc-400 shrink-0">
              KARTS: <strong className="text-race-purple">{totalKarts}</strong>
            </span>
          </div>
        </header>
      );
    }

    // Main Kart Classifier Component
    function KartClassifier({ classifiedKarts, selectedCircuit, isRecording }) {
      const [selectedKart, setSelectedKart] = useState(null);

      const bestOverallAvgMs = classifiedKarts.length > 0 ? classifiedKarts[0].avgLapMs : 0;

      return (
        <div className="flex-1 flex flex-col bg-black p-2.5 sm:p-3 space-y-2.5 sm:space-y-3 overflow-y-auto custom-scrollbar select-none font-mono">
          {/* Status Banner */}
          <div className="bg-gradient-to-r from-zinc-950 via-purple-950/40 to-zinc-950 border-2 border-race-purple rounded-2xl p-2.5 sm:p-3 shadow-[0_0_20px_rgba(217,70,239,0.3)] shrink-0 flex items-center justify-between">
            <div className="min-w-0 pr-2">
              <span className="text-[9px] sm:text-[10px] text-race-purple font-extrabold uppercase tracking-wider flex items-center gap-1 truncate">
                <span>🛡️ DATOS DE TIMING REAL EN VIVO</span>
              </span>
              <h2 className="text-[11px] sm:text-xs font-black text-white truncate">
                CLASIFICACIÓN POR MEDIA ({selectedCircuit.name.split(' ')[1] || 'CAMPILLOS'})
              </h2>
            </div>

            <div className="px-2.5 py-1 rounded-xl bg-purple-950 border border-race-purple text-race-purple font-extrabold text-[9px] sm:text-[10px] shrink-0">
              {isRecording ? '🔴 VIVO' : '⏸️ PAUSA'}
            </div>
          </div>

          {classifiedKarts.length === 0 ? (
            <div className="flex-1 border-2 border-dashed border-zinc-800 rounded-2xl p-4 sm:p-6 flex flex-col items-center justify-center text-center">
              <div className="w-9 h-9 sm:w-10 sm:h-10 rounded-full border-4 border-race-purple border-t-transparent animate-spin mb-3"></div>
              <h3 className="text-xs sm:text-sm font-bold text-white uppercase">
                {isRecording ? 'CONECTANDO A TELEMETRÍA EN VIVO...' : 'CAPTURA EN PAUSA'}
              </h3>
              <p className="text-[11px] sm:text-xs text-zinc-400 mt-2 max-w-xs leading-relaxed">
                {isRecording 
                  ? `Escuchando el cronometraje de ${selectedCircuit.name}. En cuanto salgan karts a pista y registren pasos por meta, aparecerán aquí.`
                  : "Pulsa el botón 'REC: OFF' en la barra superior para activar la captura de datos en vivo de este circuito."}
              </p>
            </div>
          ) : (
            <div className="space-y-2 sm:space-y-2.5">
              {classifiedKarts.map((kart, idx) => {
                const isBestAvg = idx === 0;
                const isWorstAvg = idx === classifiedKarts.length - 1 && classifiedKarts.length > 1;
                const isExpanded = selectedKart === kart.kartNumber;
                const deltaVsBestAvg = bestOverallAvgMs > 0 ? (kart.avgLapMs - bestOverallAvgMs) / 1000 : 0;

                return (
                  <div
                    key={kart.kartNumber}
                    className={`bg-zinc-950 border-2 rounded-2xl p-2.5 sm:p-3.5 transition-all ${
                      isBestAvg 
                        ? 'border-race-purple shadow-[0_0_25px_rgba(217,70,239,0.4)]' 
                        : isWorstAvg
                        ? 'border-red-950/80 shadow-[0_0_15px_rgba(255,51,68,0.2)]'
                        : 'border-zinc-800 hover:border-zinc-700'
                    }`}
                  >
                    {/* Top Line */}
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-2 sm:gap-3 min-w-0 pr-2">
                        <div className={`flex items-center justify-center font-mono font-black text-sm sm:text-base w-8 h-8 sm:w-9 sm:h-9 rounded-xl shrink-0 ${
                          isBestAvg ? 'bg-race-purple text-black shadow-[0_0_12px_rgba(217,70,239,0.6)]' :
                          idx === 1 ? 'bg-purple-900 text-white' :
                          idx === 2 ? 'bg-zinc-800 text-purple-300' : 'bg-black text-zinc-500 border border-zinc-800'
                        }`}>
                          #{idx + 1}
                        </div>

                        <div className="min-w-0">
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <span className="text-white font-black text-base sm:text-lg">
                              KART #{kart.kartNumber}
                            </span>
                            <span className={`text-[9px] sm:text-[10px] font-bold px-2 py-0.5 rounded-full border ${
                              isBestAvg ? 'bg-purple-950/80 border-race-purple text-race-purple text-glow-purple' :
                              'bg-zinc-900 border-zinc-700 text-zinc-300'
                            }`}>
                              {isBestAvg ? '🚀 MEJOR MEDIA' : isWorstAvg ? '🐌 PEOR MEDIA' : `POS #${idx + 1}`}
                            </span>
                          </div>
                          <div className="text-[10px] sm:text-[11px] text-zinc-400 mt-0.5 truncate">
                            👤 PILOTOS: <strong className="text-race-purple font-extrabold">{kart.drivers.length > 0 ? kart.drivers.join(', ') : 'Registrando en vivo...'}</strong>
                          </div>
                        </div>
                      </div>

                      {/* Average Lap Time */}
                      <div className="text-right shrink-0">
                        <div className="text-[8px] sm:text-[9px] text-zinc-500 font-bold uppercase">MEDIA VUELTA</div>
                        <div className={`text-lg sm:text-xl font-black ${
                          isBestAvg ? 'text-race-purple text-glow-purple' : 'text-white'
                        }`}>
                          {formatLapTime(kart.avgLapMs)}
                        </div>
                      </div>
                    </div>

                    {/* Metrics Bar */}
                    <div className="grid grid-cols-3 gap-1.5 mt-2.5 pt-2 border-t border-zinc-900 text-center">
                      <div className="bg-black border border-zinc-900 rounded-xl p-1.5">
                        <span className="text-[8px] sm:text-[9px] text-zinc-500 font-bold block uppercase">MEDIA</span>
                        <span className="text-xs sm:text-sm font-black text-race-purple text-glow-purple">
                          {formatLapTime(kart.avgLapMs)}
                        </span>
                      </div>

                      <div className="bg-black border border-zinc-900 rounded-xl p-1.5">
                        <span className="text-[8px] sm:text-[9px] text-zinc-500 font-bold block uppercase">MEJOR</span>
                        <span className="text-xs sm:text-sm font-bold text-zinc-200">
                          {formatLapTime(kart.bestLapMs)}
                        </span>
                      </div>

                      <div className="bg-black border border-zinc-900 rounded-xl p-1.5">
                        <span className="text-[8px] sm:text-[9px] text-zinc-500 font-bold block uppercase">GAP VS #1</span>
                        <span className={`text-xs sm:text-sm font-black ${deltaVsBestAvg === 0 ? 'text-race-purple' : 'text-race-red'}`}>
                          {deltaVsBestAvg === 0 ? 'TOP' : `${formatDelta(deltaVsBestAvg)}s`}
                        </span>
                      </div>
                    </div>

                    {/* Toggle Details Button */}
                    <button
                      onClick={() => setSelectedKart(isExpanded ? null : kart.kartNumber)}
                      className="w-full mt-2 pt-1 text-center text-[9px] sm:text-[10px] text-zinc-500 hover:text-race-purple transition-colors border-t border-zinc-900/60 font-bold py-1 active:scale-98"
                    >
                      {isExpanded ? '▲ OCULTAR DETALLES' : '▼ VER PILOTOS QUE LO HAN LLEVADO'}
                    </button>

                    {isExpanded && (
                      <div className="mt-2 p-2 sm:p-2.5 bg-black border border-zinc-900 rounded-xl text-xs space-y-1.5">
                        <div className="text-race-purple text-[9px] sm:text-[10px] font-bold uppercase">
                          👥 PILOTOS REGISTRADOS EN EL KART #{kart.kartNumber}:
                        </div>
                        <div className="flex flex-wrap gap-1">
                          {kart.drivers.length > 0 ? (
                            kart.drivers.map((dName, dIdx) => (
                              <span key={dIdx} className="bg-purple-950/60 border border-race-purple/40 text-race-purple px-2 py-0.5 rounded-md text-[9px] sm:text-[10px] font-bold">
                                👤 {dName}
                              </span>
                            ))
                          ) : (
                            <span className="text-zinc-500 text-[10px]">Sin pilotos registrados</span>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // LIVE TIMING MODAL COMPONENT
    function LiveTimingModal({ isOpen, onClose, selectedCircuit }) {
      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-50 bg-black/95 backdrop-blur-md flex flex-col font-mono select-none">
          <div className="flex items-center justify-between p-2.5 sm:p-3 bg-zinc-950 border-b border-zinc-800 shrink-0">
            <div className="flex items-center gap-1.5 min-w-0 pr-2">
              <span className="relative flex h-2 w-2 shrink-0">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-race-purple opacity-75"></span>
                <span className="relative inline-flex rounded-full h-2 w-2 bg-race-purple"></span>
              </span>
              <h2 className="text-xs sm:text-sm font-black text-white uppercase truncate">
                ⏱️ TIMING EN DIRECTO
              </h2>
            </div>

            <div className="flex items-center gap-1.5 shrink-0">
              <a
                href={selectedCircuit.url}
                target="_blank"
                rel="noreferrer"
                className="text-[10px] sm:text-xs bg-zinc-900 border border-zinc-800 text-race-purple px-2 py-1 rounded-xl font-bold hover:text-white"
              >
                ABRIR ↗
              </a>

              <button
                onClick={onClose}
                className="bg-race-purple text-black font-black text-[11px] sm:text-xs px-2.5 py-1 rounded-xl hover:bg-emerald-400 active:scale-95 transition-all"
              >
                ✕ CERRAR
              </button>
            </div>
          </div>

          <div className="flex-1 w-full h-full bg-black relative overflow-hidden">
            <iframe
              src={selectedCircuit.url}
              title={`Apex Live Timing - ${selectedCircuit.name}`}
              className="w-full h-full border-0 bg-black"
              sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
            />
          </div>
        </div>
      );
    }

    // Settings Modal
    function SettingsModal({ isOpen, onClose, selectedCircuit }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex items-center justify-center p-3 font-mono">
          <div className="bg-zinc-950 border border-zinc-800 rounded-2xl w-full max-w-md p-4 space-y-4">
            <div className="flex items-center justify-between border-b border-zinc-900 pb-2">
              <h3 className="text-sm font-bold text-race-purple">⚙️ CONEXIÓN TIMING REAL</h3>
              <button onClick={onClose} className="text-zinc-400 hover:text-white font-bold text-sm">✕</button>
            </div>

            <div className="space-y-2 text-xs">
              <label className="text-zinc-400 font-bold text-[10px] uppercase">URL CIRCUITO ACTIVO</label>
              <input
                type="text"
                readOnly
                value={selectedCircuit.url}
                className="w-full bg-black border border-zinc-800 rounded-xl px-3 py-2 text-race-purple font-bold text-[11px]"
              />

              <div className="bg-black p-3 border border-zinc-800 rounded-xl mt-3 space-y-1">
                <span className="text-xs text-race-purple font-bold block">📱 VISTA 100% RESPONSIVE</span>
                <p className="text-[10px] text-zinc-400 leading-relaxed">
                  Conectado al servidor de Apex Timing de {selectedCircuit.name}. Todos los datos se actualizan automáticamente en tiempo real.
                </p>
              </div>
            </div>

            <button
              onClick={onClose}
              className="w-full bg-race-purple text-black font-black py-2 rounded-xl text-xs"
            >
              CERRAR
            </button>
          </div>
        </div>
      );
    }

    // SESSION FINISHED ALERT MODAL COMPONENT
    function SessionAlertModal({ isOpen, onClose }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 bg-black/85 backdrop-blur-md flex items-center justify-center p-4 font-mono select-none">
          <div className="bg-zinc-950 border-2 border-race-purple rounded-2xl w-full max-w-sm p-4 text-center space-y-4 shadow-[0_0_30px_rgba(217,70,239,0.5)]">
            <div className="text-3xl">🏁</div>
            <h3 className="text-sm font-black text-race-purple uppercase tracking-wider text-glow-purple">
              ¡Sesión Finalizada!
            </h3>
            <p className="text-[11px] text-zinc-300 leading-relaxed">
              El programa ha detectado el final de la tanda. La captura se ha pausado y los promedios finales se han congelado correctamente en la pantalla.
            </p>
            <div className="bg-black p-2 border border-zinc-900 rounded-xl text-[10px] text-zinc-400">
              💡 Pulsa <strong className="text-white">"REINICIAR"</strong> para borrar la parrilla antes de arrancar la siguiente manga.
            </div>
            <button
              onClick={onClose}
              className="w-full bg-race-purple text-black font-black py-2.5 rounded-xl text-xs transition-all active:scale-95 shadow-[0_0_12px_rgba(217,70,239,0.4)]"
            >
              ENTENDIDO
            </button>
          </div>
        </div>
      );
    }

    // Main App Root
    function App() {
      const [selectedCircuit, setSelectedCircuit] = useState(CIRCUITS_LIST[0]);
      const [classifiedKarts, setClassifiedKarts] = useState([]);
      const [isRecording, setIsRecording] = useState(false);
      const [statusText, setStatusText] = useState('⏸️ CAPTURA EN PAUSA (PULSA REC ON)');
      const [isLiveTimingOpen, setIsLiveTimingOpen] = useState(false);
      const [isConfigOpen, setIsConfigOpen] = useState(false);
      const [isSessionAlertOpen, setIsSessionAlertOpen] = useState(false);

      const engineRef = useRef(null);

      useEffect(() => {
        engineRef.current = new RealApexTimingClient(
          selectedCircuit,
          (data) => {
            setClassifiedKarts(data.classifiedKarts);
            if (data.isRecording !== undefined) setIsRecording(data.isRecording);
            setStatusText(data.statusText);
          },
          () => {
            // Callback when session ends
            setIsSessionAlertOpen(true);
          }
        );

        engineRef.current.start();

        return () => {
          if (engineRef.current) engineRef.current.stop();
        };
      }, [selectedCircuit]);

      const handleToggleRecording = () => {
        const nextState = !isRecording;
        setIsRecording(nextState);
        if (engineRef.current) {
          engineRef.current.setRecordingMode(nextState);
        }
      };

      const handleResetCircuit = () => {
        if (window.confirm(`¿Estás seguro de REINICIAR los datos guardados ÚNICAMENTE de ${selectedCircuit.name}?`)) {
          if (engineRef.current) {
            engineRef.current.resetCurrentCircuitData();
          }
        }
      };

      return (
        <div className="h-full w-full bg-black text-white flex flex-col overflow-hidden relative font-mono text-xs">
          <Header
            selectedCircuit={selectedCircuit}
            onSelectCircuit={setSelectedCircuit}
            totalKarts={classifiedKarts.length}
            statusText={statusText}
            isRecording={isRecording}
            onToggleRecording={handleToggleRecording}
            onResetCircuit={handleResetCircuit}
            onOpenLiveTiming={() => setIsLiveTimingOpen(true)}
            onOpenConfig={() => setIsConfigOpen(true)}
          />

          <main className="flex-1 flex flex-col min-h-0 bg-black overflow-hidden relative">
            <KartClassifier
              classifiedKarts={classifiedKarts}
              selectedCircuit={selectedCircuit}
              isRecording={isRecording}
            />
          </main>

          <LiveTimingModal
            isOpen={isLiveTimingOpen}
            onClose={() => setIsLiveTimingOpen(false)}
            selectedCircuit={selectedCircuit}
          />

          <SettingsModal
            isOpen={isConfigOpen}
            onClose={() => setIsConfigOpen(false)}
            selectedCircuit={selectedCircuit}
          />

          <SessionAlertModal
            isOpen={isSessionAlertOpen}
            onClose={() => setIsSessionAlertOpen(false)}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
